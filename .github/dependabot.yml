version: 2
updates:
  # GitHub Actions のバージョン更新 (SHA ピン留めを維持したまま更新 PR を作成)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]

  # .NET (NuGet) 依存
  - package-ecosystem: nuget
    directories:
      - "/src/IruTagUpdater"
      - "/tests/IruTagUpdater.Tests"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
    groups:
      dotnet:
        patterns: ["*"]

  # Dockerfile のベースイメージ
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
